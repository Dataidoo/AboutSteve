<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#dde4ee">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="AboutSteve">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/app-icon-192.png">
  <title>Steven Bonnar — Resume</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#dde4ee;--shadow-dark:#b7c0d0;--shadow-light:#ffffff;
      --text:#3a4255;--text-soft:#727b8e;--text-faint:#97a0b2;
      --accent:#5b6ee0;--accent-soft:#8e9bef;--accent-ink:#ffffff;
      --dir:1;--d:7px;--blur:15px;--radius:22px;
    }
    .app[data-mode="off"] {
      --bg:#dbe5e8;--shadow-dark:#b2c0c6;--shadow-light:#ffffff;
      --text:#3d4750;--text-soft:#6f7a82;--text-faint:#98a4ab;
      --accent:#e57f55;--accent-soft:#f0a587;--accent-ink:#ffffff;--dir:-1;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{background:var(--bg);scroll-behavior:smooth;}
    body{font-family:'Manrope',system-ui,sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;transition:background .7s ease;min-height:100vh;}
    .app{background:var(--bg);transition:background .7s ease;min-height:100vh;padding:48px 24px 96px;}
    .wrap{max-width:1060px;margin:0 auto;}
    h1,h2,h3,.sora{font-family:'Sora',sans-serif;}
    .raised{background:var(--bg);box-shadow:calc(var(--dir)*var(--d)) var(--d) var(--blur) var(--shadow-dark),calc(var(--dir)*var(--d)*-1) calc(var(--d)*-1) var(--blur) var(--shadow-light);transition:box-shadow .7s ease,background .7s ease,color .7s ease,transform .35s ease;}
    .pressed{background:var(--bg);box-shadow:inset calc(var(--dir)*var(--d)) var(--d) var(--blur) var(--shadow-dark),inset calc(var(--dir)*var(--d)*-1) calc(var(--d)*-1) var(--blur) var(--shadow-light);transition:box-shadow .7s ease,background .7s ease,color .7s ease;}

    /* HERO */
    .hero{display:grid;grid-template-columns:300px 1fr;gap:44px;align-items:stretch;}
    @media(max-width:820px){.hero{grid-template-columns:1fr;gap:32px;}}
    .pedestal{border-radius:30px;padding:22px 22px 18px;display:flex;flex-direction:column;align-items:center;gap:16px;}
    .avatar-stage{width:100%;aspect-ratio:3/4;perspective:1400px;cursor:pointer;position:relative;}
    .avatar-flip{position:absolute;inset:0;transform-style:preserve-3d;transition:transform .85s cubic-bezier(.62,.04,.3,1);}
    .app[data-mode="off"] .avatar-flip{transform:rotateY(180deg);}
    .avatar-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:20px;overflow:hidden;box-shadow:inset calc(var(--dir)*5px) 5px 12px var(--shadow-dark),inset calc(var(--dir)*-5px) -5px 12px var(--shadow-light);}
    .avatar-face.back{transform:rotateY(180deg);}
    .avatar-face img{width:100%;height:100%;object-fit:cover;display:block;}
    .avatar-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#c8d0e0,#d8e0f0);font-family:'Sora',sans-serif;font-size:12px;font-weight:700;color:rgba(90,110,150,.45);text-align:center;padding:20px;line-height:1.5;}
    .rotate-hint{position:absolute;right:12px;bottom:12px;width:46px;height:46px;border-radius:50%;display:grid;place-items:center;color:var(--accent);z-index:3;pointer-events:none;animation:nudge 3.2s ease-in-out infinite;}
    @keyframes nudge{0%,88%,100%{transform:rotate(0)}94%{transform:rotate(-26deg)}}
    .rotate-hint svg{width:22px;height:22px;}
    .mode-label{display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;}
    .mode-label .now{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint);font-weight:700;white-space:nowrap;}
    .mode-label .val{font-family:'Sora',sans-serif;font-weight:700;font-size:19px;color:var(--accent);transition:color .7s ease;}
    .intro{display:flex;flex-direction:column;justify-content:center;gap:18px;}
    .status{align-self:flex-start;display:inline-flex;align-items:center;gap:9px;padding:9px 16px;border-radius:40px;font-size:12.5px;font-weight:700;letter-spacing:.04em;color:var(--text-soft);}
    .dot{width:9px;height:9px;border-radius:50%;background:#34c77b;box-shadow:0 0 0 0 rgba(52,199,123,.5);animation:pulse 2.4s infinite;}
    @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(52,199,123,.45)}70%{box-shadow:0 0 0 9px rgba(52,199,123,0)}100%{box-shadow:0 0 0 0 rgba(52,199,123,0)}}
    .name{font-size:clamp(34px,5.5vw,54px);font-weight:800;line-height:1.02;letter-spacing:-.02em;}
    .role{font-size:clamp(17px,2.4vw,22px);font-weight:700;color:var(--accent);transition:color .7s ease;min-height:1.3em;}
    .tagline{font-size:15.5px;line-height:1.6;color:var(--text-soft);max-width:46ch;}
    .socials{display:flex;gap:14px;flex-wrap:wrap;margin-top:4px;}
    .soc{width:52px;height:52px;border-radius:16px;display:grid;place-items:center;font-family:'Sora',sans-serif;font-weight:700;font-size:15px;color:var(--text-soft);text-decoration:none;cursor:pointer;border:none;position:relative;transition:color .2s,transform .2s;}
    .soc:hover{color:var(--accent);transform:translateY(-2px);}
    .soc svg{width:22px;height:22px;}
    .soc .tip{position:absolute;bottom:-30px;left:50%;transform:translateX(-50%) scale(.9);background:var(--text);color:var(--bg);font-family:'Manrope';font-size:11px;font-weight:600;padding:4px 9px;border-radius:7px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .18s,transform .18s;z-index:5;}
    .soc:hover .tip{opacity:1;transform:translateX(-50%) scale(1);}
    .soc-wide{width:auto;padding:0 20px;gap:10px;display:inline-flex;flex-direction:row;align-items:center;}
    .soc-wide .soc-wide-label{font-size:13px;font-weight:700;color:var(--text-soft);transition:color .2s;}
    .soc-wide:hover .soc-wide-label{color:var(--accent);}
    .toggle{margin-top:8px;position:relative;display:inline-flex;padding:6px;border-radius:40px;gap:0;align-self:flex-start;}
    .toggle .thumb{position:absolute;top:6px;left:6px;height:calc(100% - 12px);width:calc(50% - 6px);border-radius:34px;background:var(--accent);box-shadow:calc(var(--dir)*3px) 3px 8px rgba(0,0,0,.14);transition:transform .5s cubic-bezier(.62,.04,.3,1),background .7s ease;}
    .app[data-mode="off"] .toggle .thumb{transform:translateX(100%);}
    .toggle button{position:relative;z-index:2;border:none;background:none;cursor:pointer;font-family:'Manrope';font-weight:700;font-size:13.5px;letter-spacing:.02em;padding:11px 22px;border-radius:34px;color:var(--text-soft);transition:color .4s ease;min-width:108px;}
    .toggle button.active{color:var(--accent-ink);}

    /* SECTIONS */
    .sections{margin-top:52px;display:grid;grid-template-columns:1fr 1fr;gap:30px;align-items:start;}
    @media(max-width:820px){.sections{grid-template-columns:1fr;}}
    .card{border-radius:var(--radius);overflow:hidden;}
    .card.full{grid-column:1/-1;}
    .card-head{width:100%;border:none;background:none;cursor:pointer;display:flex;align-items:center;gap:16px;padding:22px 24px;text-align:left;color:var(--text);font-family:'Manrope';}
    .card-ico{width:46px;height:46px;border-radius:14px;flex:none;display:grid;place-items:center;color:var(--accent);transition:color .7s ease,box-shadow .7s ease;}
    .card-ico svg{width:22px;height:22px;}
    .htext{flex:1;display:flex;flex-direction:column;gap:2px;}
    .htitle{display:block;font-family:'Sora';font-weight:700;font-size:17px;}
    .hsub{display:block;font-size:12.5px;color:var(--text-faint);font-weight:600;}
    .chev{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;color:var(--text-soft);transition:transform .4s ease,color .3s;flex:none;}
    .card.open .chev{transform:rotate(180deg);color:var(--accent);}
    .chev svg{width:16px;height:16px;}
    .card-bodywrap{display:grid;grid-template-rows:0fr;transition:grid-template-rows .5s cubic-bezier(.5,0,.2,1);}
    .card.open .card-bodywrap{grid-template-rows:1fr;}
    .card-body{overflow:hidden;}
    .card-inner{padding:4px 24px 26px;}
    .swap{transition:opacity .35s ease;}
    .swap.fading{opacity:0;}

    /* about */
    .bio{font-size:14.5px;line-height:1.7;color:var(--text-soft);}
    .bio strong{color:var(--text);font-weight:700;}
    .facts{display:flex;flex-wrap:wrap;gap:12px;margin-top:18px;}
    .fact{padding:10px 16px;border-radius:14px;font-size:13px;font-weight:600;color:var(--text-soft);}
    .fact b{color:var(--accent);font-family:'Sora';}

    /* timeline */
    .tl{display:flex;flex-direction:column;gap:8px;}
    .tl-item{display:grid;grid-template-columns:60px 1fr 110px;gap:18px;padding:14px 0;align-items:center;}
    .tl-when{font-family:'Sora';font-weight:700;font-size:12.5px;color:var(--accent);padding-top:2px;}
    .tl-role{font-weight:700;font-size:15px;}
    .tl-org{font-size:13px;color:var(--text-faint);font-weight:600;margin:1px 0 7px;}
    .tl-desc{font-size:13.5px;line-height:1.6;color:var(--text-soft);}
    .tl-item+.tl-item{border-top:1px solid rgba(183,192,208,.4);}
    .tl-img{width:110px;height:110px;border-radius:16px;overflow:hidden;flex:none;position:relative;}
    .tl-img img{width:100%;height:100%;object-fit:cover;display:block;}
    .tl-img-ph{display:none;position:absolute;inset:0;align-items:center;justify-content:center;text-align:center;font-family:'Sora';font-size:10px;font-weight:700;color:var(--text-faint);padding:8px;line-height:1.4;}
    @media(max-width:560px){.tl-item{grid-template-columns:60px 1fr;}.tl-img{grid-column:1/-1;width:100%;height:140px;}}

    /* skills */
    .skill{margin-bottom:16px;}
    .skill-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px;}
    .skill-name{font-weight:700;font-size:14px;}
    .skill-pct{font-family:'Sora';font-size:12px;font-weight:700;color:var(--text-faint);}
    .track{height:14px;border-radius:20px;padding:3px;}
    .fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--accent-soft),var(--accent));transition:width .8s cubic-bezier(.5,0,.2,1),background .7s ease;}
    .chips{display:flex;flex-wrap:wrap;gap:12px;}
    .chip{padding:10px 18px;border-radius:30px;font-size:13px;font-weight:700;color:var(--text-soft);}

    /* projects */
    .proj-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
    @media(max-width:560px){.proj-grid{grid-template-columns:1fr;}}
    .proj{border-radius:18px;padding:20px;cursor:pointer;text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:8px;transition:transform .3s ease,box-shadow .7s ease;}
    .proj:hover{transform:translateY(-3px);}
    .pt{font-family:'Sora';font-weight:700;font-size:15px;}
    .pd{font-size:12.5px;line-height:1.55;color:var(--text-soft);}
    .pmeta{margin-top:auto;display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;}
    .pmeta svg{width:13px;height:13px;}

    /* contact */
    .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    @media(max-width:560px){.contact-grid{grid-template-columns:1fr;}}
    .cbtn{display:flex;align-items:center;gap:12px;text-decoration:none;padding:16px 18px;border-radius:16px;color:var(--text);cursor:pointer;font-weight:700;font-size:14px;transition:transform .3s ease,box-shadow .7s ease,color .2s;width:100%;}
    .cbtn:hover{transform:translateY(-2px);color:var(--accent);}
    .cbtn small{display:block;font-size:11.5px;color:var(--text-faint);font-weight:600;margin-top:1px;}
    .ci{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;color:var(--accent);flex:none;}
    .ci svg{width:20px;height:20px;}

    /* cert list */
    .cert-list{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
    @media(max-width:560px){.cert-list{grid-template-columns:1fr;}}
    .cert-item{display:flex;align-items:center;gap:12px;padding:11px 8px;font-size:13px;font-weight:600;color:var(--text-soft);}
    .cert-note{font-style:italic;font-size:11.5px;font-weight:500;color:var(--text-faint);}
    .see-sidequests{margin-top:16px;border:none;cursor:pointer;background:var(--bg);border-radius:14px;padding:11px 16px;display:inline-flex;align-items:center;justify-content:center;gap:10px;font-family:'Manrope',sans-serif;font-weight:700;font-size:12.5px;letter-spacing:.04em;color:var(--text-soft);transition:color .2s,transform .2s,box-shadow .7s ease;}
    .see-sidequests:hover{color:var(--accent);transform:translateY(-2px);}
    .see-sidequests .ssq-arrow{display:inline-grid;place-items:center;width:18px;height:18px;color:var(--accent);transition:transform .25s ease;}
    .see-sidequests:hover .ssq-arrow{transform:translateX(3px);}
    .see-sidequests .ssq-arrow svg{width:16px;height:16px;}
    .cert-ico{width:44px;height:44px;border-radius:13px;display:grid;place-items:center;color:var(--accent);flex:none;}
    .cert-ico svg{width:24px;height:24px;}

    /* job cards */
    .job-grid{display:flex;flex-direction:column;gap:10px;}
    .job-card{border-radius:18px;overflow:hidden;}
    .job-head{width:100%;border:none;background:none;cursor:pointer;padding:16px 20px;text-align:left;display:grid;grid-template-columns:90px 1fr auto;gap:16px;align-items:center;color:var(--text);font-family:'Manrope';}
    .job-head:hover .job-co{color:var(--accent);}
    .job-when-tag{font-family:'Sora',sans-serif;font-weight:700;font-size:12px;color:var(--accent);}
    .job-co{font-family:'Sora',sans-serif;font-weight:700;font-size:14.5px;color:var(--text);transition:color .2s;}
    .job-role-tag{font-size:12px;font-weight:600;color:var(--text-soft);margin-top:2px;}
    .job-chev{display:grid;place-items:center;color:var(--text-soft);transition:transform .4s ease,color .3s;flex:none;}
    .job-card.open .job-chev{transform:rotate(180deg);color:var(--accent);}
    .job-chev svg{width:15px;height:15px;}
    .job-bodywrap{display:grid;grid-template-rows:0fr;transition:grid-template-rows .5s cubic-bezier(.5,0,.2,1);}
    .job-card.open .job-bodywrap{grid-template-rows:1fr;}
    .job-body{overflow:hidden;}
    .job-inner{padding:4px 20px 18px;border-top:1px solid rgba(183,192,208,.25);}
    .job-desc{font-size:13.5px;line-height:1.65;color:var(--text-soft);margin-top:12px;}
    .job-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint);margin:14px 0 7px;}
    .job-chips{display:flex;flex-wrap:wrap;gap:7px;}
    .job-chip{padding:5px 11px;border-radius:20px;font-size:11.5px;font-weight:600;color:var(--text-soft);}
    @media(max-width:560px){.job-head{grid-template-columns:70px 1fr auto;gap:10px;}}
    .foot{margin-top:52px;display:flex;justify-content:center;}
    .status-foot{display:inline-flex;align-items:center;gap:9px;padding:9px 20px;border-radius:40px;font-size:12.5px;font-weight:700;letter-spacing:.04em;color:var(--text-soft);}

    /* fun grid */
    .fun-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(82px,1fr));gap:18px 10px;}
    .fun-item{display:flex;flex-direction:column;align-items:center;gap:7px;}
    .fun-icon{width:56px;height:56px;border-radius:18px;display:grid;place-items:center;flex:none;overflow:hidden;position:relative;}
    .fun-icon img{width:38px;height:38px;object-fit:contain;display:block;}
    .fun-icon .emoji-fb{font-size:26px;line-height:1;display:none;}
    .fun-name{font-size:11px;font-weight:700;color:var(--text-soft);text-align:center;line-height:1.3;}
    .fun-stars{display:flex;gap:2px;font-size:14px;}
    .about-into-label{font-family:'Sora';font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-faint);margin:24px 0 14px;padding-top:18px;border-top:1px solid rgba(183,192,208,.4);}

    /* subtle glow for website button */
    .cbtn.glow{position:relative;}
    .cbtn.glow::before{content:"";position:absolute;inset:-2px;border-radius:18px;background:radial-gradient(circle at 30% 50%,var(--accent-soft),transparent 65%);opacity:.35;filter:blur(8px);z-index:-1;animation:websiteGlow 3.2s ease-in-out infinite;pointer-events:none;}
    @keyframes websiteGlow{0%,100%{opacity:.25;}50%{opacity:.55;}}

    /* PNG icons match SVG sizes in each container */
    .soc img.ico-png{width:22px;height:22px;}
    .card-ico img.ico-png{width:22px;height:22px;}
    .cert-ico img.ico-png{width:24px;height:24px;}
    .ci img.ico-png{width:20px;height:20px;}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const {useState,useEffect} = React;

const I = {
  rotate:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>,
  chevron:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9l6 6 6-6"/></svg>,
  user:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="4"/><path d="M5 20c1.5-3.5 4-5 7-5s5.5 1.5 7 5"/></svg>,
  work:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="7" width="18" height="13" rx="2.5"/><path d="M8 7V5.5A1.5 1.5 0 0 1 9.5 4h5A1.5 1.5 0 0 1 16 5.5V7"/></svg>,
  skills:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3l3 6 6 .9-4.5 4.2 1 6-5.5-3-5.5 3 1-6L3 9.9 9 9z"/></svg>,
  proj:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="4" width="11" height="11" rx="2"/><rect x="9" y="9" width="11" height="11" rx="2"/></svg>,
  mail:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="M3.5 7l8.5 6 8.5-6"/></svg>,
  link:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a4 4 0 0 0 6 .5l2.5-2.5a4 4 0 0 0-5.7-5.7L11.5 6.5"/><path d="M14 11a4 4 0 0 0-6-.5L5.5 13a4 4 0 0 0 5.7 5.7L12.5 17.5"/></svg>,
  arrow:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg>,
  pin:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 21s-6-5.2-6-10a6 6 0 0 1 12 0c0 4.8-6 10-6 10z"/><circle cx="12" cy="11" r="2.2"/></svg>,

function Ico({name, w=20, h=20, children}) {
  const [err, setErr] = useState(false);
  if (err) return children;
  return <img src={`assets/icon-${name}.png`} className="ico-png"
    style={{objectFit:"contain",display:"block"}}
    onError={()=>setErr(true)} alt="" />;
}

function Card({icon, iconName, title, sub, defaultOpen, full, children}) {
  const [open,setOpen] = useState(!!defaultOpen);
  return (
    <div className={"card raised"+(open?" open":"")+(full?" full":"")}>
      <button className="card-head" onClick={()=>setOpen(o=>!o)} aria-expanded={open}>
        <span className="card-ico pressed">
          {iconName ? <Ico name={iconName}>{icon}</Ico> : icon}
        </span>
        <span className="htext"><span className="htitle">{title}</span><span className="hsub">{sub}</span></span>
        <span className="chev">{I.chevron}</span>
      </button>
      <div className="card-bodywrap"><div className="card-body"><div className="card-inner">{children}</div></div></div>
    </div>
  );
}

function JobCard({co,loc,when,role,desc,equipment,tools}) {
  const [open,setOpen] = useState(false);
  return (
    <div className={"job-card raised"+(open?" open":"")}>
      <button className="job-head" onClick={()=>setOpen(o=>!o)}>
        <div className="job-when-tag">{when}</div>
        <div>
          <div className="job-co">{co}</div>
          <div className="job-role-tag">{role} · {loc}</div>
        </div>
        <span className="job-chev">{I.chevron}</span>
      </button>
      <div className="job-bodywrap"><div className="job-body"><div className="job-inner">
        <p className="job-desc">{desc}</p>
        {equipment&&<>
          <div className="job-label">Equipment</div>
          <div className="job-chips">{equipment.map(e=><span key={e} className="job-chip pressed">{e}</span>)}</div>
        </>}
        {tools&&<>
          <div className="job-label">Tech & Tools</div>
          <div className="job-chips">{tools.map(t=><span key={t} className="job-chip pressed">{t}</span>)}</div>
        </>}
      </div></div></div>
    </div>
  );
}
